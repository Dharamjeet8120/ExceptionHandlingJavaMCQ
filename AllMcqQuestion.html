// State
let state = {
  screen: 'topics',
  questions: [],
  current: 0,
  score: 0,
  answers: [],
  topicName: '',
  topicId: -1,
  answered: false
};

function init() {
  const grid = document.getElementById('topics-grid');
  TOPICS.forEach((t, i) => {
    const count = ALL_QUESTIONS.filter(q => q.t === t.id).length;
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.style.cssText = `--tc:${t.color}; animation-delay:${i*0.05}s`;
    card.innerHTML = `
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-info">
        <div class="tc-name">${t.name}</div>
        <div class="tc-desc">${t.desc}</div>
      </div>
      <div class="tc-count">${count} Qs</div>
    `;
    card.onclick = () => startQuiz(t.id, t.name, t.color);
    grid.appendChild(card);
  });
}

function startQuiz(topicId, topicName, color) {
  const qs = topicId === -1 ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.t === topicId);
  state = { screen:'quiz', questions: shuffle(qs), current:0, score:0, answers:[], topicName, topicId, answered:false, color: color||'var(--accent)' };
  document.getElementById('screen-topics').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-results').style.display = 'none';
  renderQuestion();
}

function startAll() { startQuiz(-1, 'All Topics (270 Qs)', 'var(--accent)'); }

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function renderQuestion() {
  state.answered = false;
  const q = state.questions[state.current];
  const total = state.questions.length;
  const pct = Math.round((state.current / total) * 100);

  document.getElementById('quiz-topic-name').textContent = state.topicName;
  document.getElementById('quiz-progress-text').textContent = `${state.current + 1} / ${total}`;
  document.getElementById('quiz-score-badge').textContent = `✓ ${state.score}  ✗ ${state.current - state.score + (state.answers.length > state.current ? 1 : 0)}`;
  document.getElementById('progress-bar').style.width = pct + '%';

  const LETTERS = ['A','B','C','D'];
  const wrap = document.getElementById('question-wrap');
  wrap.innerHTML = `
    <div class="q-num">Q${state.current + 1} of ${total} &nbsp;·&nbsp; ${state.topicId === -1 ? TOPICS[q.t]?.name : state.topicName}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts">
      ${q.o.map((opt, i) => `
        <div class="option" id="opt-${i}" onclick="selectOption(${i})">
          <div class="opt-letter">${LETTERS[i]}</div>
          <div>${opt}</div>
        </div>`).join('')}
    </div>
    <div class="explanation" id="explanation">💡 ${q.e}</div>
    <div class="nav-row" id="nav-row">
      <button class="nav-btn btn-skip" onclick="skipQuestion()">Skip →</button>
    </div>
  `;
}

function selectOption(idx) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.current];
  const correct = idx === q.a;
  if (correct) state.score++;

  state.answers.push({ q: q.q, chosen: idx, correct: q.a, isCorrect: correct, opts: q.o });

  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === q.a) el.classList.add('correct');
    else if (i === idx && !correct) el.classList.add('wrong');
  });

  document.getElementById('explanation').classList.add('show');
  document.getElementById('quiz-score-badge').textContent = `✓ ${state.score}  ✗ ${state.answers.length - state.score}`;

  const nav = document.getElementById('nav-row');
  const isLast = state.current >= state.questions.length - 1;
  nav.innerHTML = isLast
    ? `<button class="nav-btn btn-finish" onclick="showResults()">Finish & See Results 🎉</button>`
    : `<button class="nav-btn btn-next" onclick="nextQuestion()">Next Question →</button>`;
}

function skipQuestion() {
  state.answers.push({ q: state.questions[state.current].q, chosen: -1, correct: state.questions[state.current].a, isCorrect: false, opts: state.questions[state.current].o, skipped: true });
  nextQuestion();
}

function nextQuestion() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'block';

  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  const skipped = state.answers.filter(a => a.skipped).length;
  const wrong = state.answers.filter(a => !a.isCorrect && !a.skipped).length;

  let emoji = '😓', grade = 'Keep Practicing';
  if (pct >= 90) { emoji = '🏆'; grade = 'Outstanding!'; }
  else if (pct >= 75) { emoji = '🎉'; grade = 'Great Job!'; }
  else if (pct >= 60) { emoji = '👍'; grade = 'Good Effort!'; }
  else if (pct >= 40) { emoji = '📚'; grade = 'Keep Studying!'; }

  const wrongAnswers = state.answers.filter(a => !a.isCorrect);
  const reviewHTML = wrongAnswers.length === 0 ? '<p style="color:var(--correct);text-align:center;font-family:Fira Code;font-size:14px;">🎯 Perfect score! All answers correct!</p>' :
    wrongAnswers.slice(0, 20).map(a => `
      <div class="review-item rev-wrong">
        <div class="review-q">${a.q}</div>
        <div class="review-ans">
          ${a.skipped ? '<span style="color:var(--muted)">Skipped</span>' : `Your answer: <span class="w">${a.opts[a.chosen] || '?'}</span>`}<br>
          Correct: <span class="c">${a.opts[a.correct]}</span>
        </div>
      </div>`).join('');

  document.getElementById('results-inner').innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-title">${grade}</div>
    <div class="result-topic">${state.topicName}</div>
    <div class="score-ring-wrap">
      <div class="score-ring" style="--pct:${pct}%">
        <div class="score-big">${pct}%</div>
        <div class="score-total">${state.score}/${total}</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" style="color:var(--correct)">${state.score}</div><div class="stat-label">Correct</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--wrong)">${wrong}</div><div class="stat-label">Wrong</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--muted)">${skipped}</div><div class="stat-label">Skipped</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--accent4)">${total}</div><div class="stat-label">Total</div></div>
    </div>
    <div class="result-actions">
      <button class="ra-btn ra-primary" onclick="startQuiz(${state.topicId}, '${state.topicName}', '${state.color}')">🔄 Retry Topic</button>
      <button class="ra-btn ra-secondary" onclick="goHome()">← All Topics</button>
    </div>
    ${wrongAnswers.length > 0 ? `<div class="review-list"><div class="review-title">📝 Review Wrong Answers (${Math.min(wrongAnswers.length,20)} shown)</div>${reviewHTML}</div>` : ''}
  `;
}

function goHome() {
  document.getElementById('screen-topics').style.display = 'block';
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-results').style.display = 'none';
}

init();
</script>
